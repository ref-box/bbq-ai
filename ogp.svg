<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF6B35"/>
      <stop offset="100%" stop-color="#E84545"/>
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.05"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
    <path d="M 60 0 L 0 0 0 60" fill="none" stroke="white" stroke-width="0.5" opacity="0.1"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Center card -->
  <rect x="80" y="80" width="1040" height="470" rx="24" fill="url(#card)"/>
  <rect x="80" y="80" width="1040" height="470" rx="24" fill="none" stroke="white" stroke-width="1.5" opacity="0.2"/>

  <!-- Flame icon (top center) -->
  <g transform="translate(600, 185)">
    <!-- Outer flame -->
    <path d="M0,-52 C8,-38 24,-28 20,-10 C28,-22 22,-38 30,-52 C38,-28 44,-8 36,12 C48,-2 44,-22 52,-36 C58,-10 52,18 36,34 C44,30 50,20 48,10 C52,28 44,46 28,54 C36,52 42,44 40,36 C42,52 30,64 14,66 C22,62 26,52 22,44 C20,58 8,68 -8,66 C2,60 4,48 0,40 C-4,52 -14,60 -22,58 C-36,56 -44,42 -40,28 C-44,36 -44,46 -38,52 C-54,40 -58,18 -50,-4 C-46,6 -46,18 -40,26 C-46,10 -48,-14 -38,-30 C-32,-18 -36,-2 -28,8 C-30,-8 -20,-26 -8,-34 C-4,-20 -10,-6 -6,6 C-2,-12 6,-34 0,-52 Z" fill="#FFF5E6" opacity="0.95"/>
    <!-- Inner flame highlight -->
    <path d="M0,-20 C4,-12 10,-6 8,4 C12,-2 10,-12 14,-20 C18,-8 18,4 12,14 C16,8 18,0 16,-6 C18,4 14,16 6,20 C10,18 12,12 10,8 C12,16 6,22 0,22 C-6,22 -12,16 -10,8 C-12,12 -10,18 -6,20 C-14,16 -18,4 -16,-6 C-18,0 -16,8 -12,14 C-18,4 -18,-8 -14,-20 C-10,-12 -12,-2 -8,4 C-10,-6 -4,-12 0,-20 Z" fill="#FFD580" opacity="0.7"/>
  </g>

  <!-- Main title -->
  <text x="600" y="308" text-anchor="middle" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="96" font-weight="900" fill="white" letter-spacing="-2">BBQ AI</text>

  <!-- Subtitle -->
  <text x="600" y="378" text-anchor="middle" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="34" font-weight="500" fill="white" opacity="0.92">バーベキュー買い物リスト作成ツール</text>

  <!-- Feature badges -->
  <g transform="translate(600, 440)">
    <!-- Badge 1 -->
    <rect x="-320" y="-18" width="188" height="36" rx="18" fill="white" opacity="0.2"/>
    <text x="-226" y="6" text-anchor="middle" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="20" fill="white">食材を自動計算</text>
    <!-- Badge 2 -->
    <rect x="-88" y="-18" width="176" height="36" rx="18" fill="white" opacity="0.2"/>
    <text x="0" y="6" text-anchor="middle" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="20" fill="white">予算も算出</text>
    <!-- Badge 3 -->
    <rect x="112" y="-18" width="208" height="36" rx="18" fill="white" opacity="0.2"/>
    <text x="216" y="6" text-anchor="middle" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="20" fill="white">LINEで共有</text>
  </g>

  <!-- Domain -->
  <text x="600" y="512" text-anchor="middle" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="22" fill="white" opacity="0.55">ref-box.com/bbq-ai/</text>
</svg>
