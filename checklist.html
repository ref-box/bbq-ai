        /* チェックリスト専用スタイル */
        .checklist-section {
            margin-bottom: 40px;

        .checklist-item:hover {

            background: #fdfdfd;
        }

        /* カスタムチェックボックス */
        .check-input {
            appearance: none;
            -webkit-appearance: none;
            width: 24px;
            height: 24px;
            border: 2px solid #cbd5e1;
            border-radius: 6px;
            background: #fff;
            cursor: pointer;
            position: relative;
            flex-shrink: 0;
            margin-top: 2px;
            transition: all 0.2s;
        }

        .check-input:checked {
            background-color: var(--brand);
            border-color: var(--brand);
        }

        .check-input:checked::after {
            content: '';
            position: absolute;
            left: 7px;
            top: 3px;
            width: 6px;
            height: 12px;
            border: solid white;
            border-width: 0 2.5px 2.5px 0;
            transform: rotate(45deg);
        }

        .check-content {
            flex: 1;
        }

        .check-title {

        .check-desc {

        /* チェック時のスタイル変化 */

                    参加メンバーへの確認事項（1週間前まで）
                </h2>
                
                <label class="checklist-item">
                    <input type="checkbox" class="check-input">
                    <div class="check-content">
                        <div class="check-title">食物アレルギー・宗教上の理由（ハラール等）の確認</div>
                        <div class="check-desc">エビ、カニなどの甲殻類や、牛肉・豚肉がNGな人がいないか必ず全員にヒアリングしましょう。該当者がいる場合は、専用のトングや網の区画分けも検討します。</div>
                    </div>
                </label>
                
                <label class="checklist-item">
                    <input type="checkbox" class="check-input">
                    <div class="check-content">
                        <div class="check-title">交通手段（車・電車）とアルコールを飲む人の確認</div>
                        <div class="check-desc">車で来る人（ハンドルキーパー）はノンアルコール飲料を多めに準備します。また、駐車場代の精算を割り勘に含めるかどうかも事前に決めておくとスムーズです。</div>
                    </div>
                </label>
                
                <label class="checklist-item">

                    会場の設備確認（見落としがちなポイント）
                </h2>
                
                <label class="checklist-item">
                    <input type="checkbox" class="check-input">
                    <div class="check-content">
                        <div class="check-title">ゴミ捨て場の有無と分別のルール</div>
                        <div class="check-desc">「ゴミは持ち帰り」の会場も多いです。持ち帰りの場合は、誰の車に積むか、臭いが漏れない厚手のゴミ袋と縛るための紐があるかを確認しましょう。</div>
                    </div>
                </label>
                
                <label class="checklist-item">
                    <input type="checkbox" class="check-input">
                    <div class="check-content">
                        <div class="check-title">使用済みの「炭（灰）」の捨て場</div>
                        <div class="check-desc">一般のゴミ箱には絶対に捨てられません。灰捨て場（炭壺）があるか確認し、ない場合は「火消し壺」か、完全に鎮火させて持ち帰るための厚手のアルミホイル等が必要です。</div>
                    </div>
                </label>

                <label class="checklist-item">
                    <input type="checkbox" class="check-input">
                    <div class="check-content">
                        <div class="check-title">水場・水道への距離</div>
                        <div class="check-desc">手洗いや網を洗うための水回り（炊事棟など）が遠いと非常に不便です。遠い場合は、ウォータージャグ（水タンク）やウェットティッシュを多めに用意しましょう。</div>
                    </div>
                </label>

                <label class="checklist-item">
                    <input type="checkbox" class="check-input">
                    <div class="check-content">
                        <div class="check-title">まな板を置いて「野菜などを切るスペース」はあるか</div>
                        <div class="check-desc">機材レンタルの場合、コンロやテーブルはあっても「調理台」がないことがよくあります。スペースがない場合は、自宅で事前に野菜を切ってジップロックに入れて持参するのが鉄則です。</div>
                    </div>
                </label>

                <label class="checklist-item">
                    <input type="checkbox" class="check-input">
                    <div class="check-content">
                        <div class="check-title">トイレの清潔さと距離（女性がいる場合は特に重要）</div>
                        <div class="check-desc">会場のトイレが仮設トイレのみだったり、トイレットペーパーが切れていることがあります。水に流せるティッシュを持参するようアナウンスしておくと親切です。</div>
                    </div>
                </label>

                <label class="checklist-item">
                    <input type="checkbox" class="check-input">
                    <div class="check-content">
                        <div class="check-title">日陰の有無（タープ・テントの必要性）</div>
                        <div class="check-desc">真夏の炎天下で日陰がないと熱中症のリスクが高まります。木陰が確保できない会場なら、タープテントの持ち込みやレンタルが必須です（風対策のペグも忘れずに）。</div>
                    </div>
                </label>
            </div>

            <div class="checklist-group">

                    <div class="check-content">
                        <div class="check-title">着火剤・チャッカマン・軍手は足りているか</div>
                        <div class="check-desc">炭があっても火が点かないという失敗がよくあります。着火剤は多めに。また、トングを握る手の火傷防止のため「耐熱性の高い軍手（または革手袋）」を買いましょう。</div>
                    </div>
                </label>
                
                <label class="checklist-item">
                    <input type="checkbox" class="check-input">
                    <div class="check-content">
                        <div class="check-title">調味料（塩コショウ・焼肉のタレ）の現地調達分</div>
                        <div class="check-desc">肉を買うスーパーで一緒に買うのを忘れずに。味変用に「レモン汁」「ポン酢」「アウトドアスパイス（ほりにし等）」があると喜ばれます。</div>
                    </div>
                </label>
                
                <label class="checklist-item">
                    <input type="checkbox" class="check-input">
                    <div class="check-content">
                        <div class="check-title">「氷」は十分な量を買ったか</div>
                        <div class="check-desc">飲み物を冷やす用（クーラーボックス内）と、グラスに入れて飲む用（ロックアイス）は別々に計算して多めに買いましょう。夏場はすぐに溶けます。</div>
                    </div>
                </label>

    <!-- チェックリストのスクリプト -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const checkboxes = document.querySelectorAll('.check-input');
            const progressText = document.getElementById('progressText');
            const progressBar = document.getElementById('progressBar');
            const total = checkboxes.length;
            
            // ローカルストレージにチェック状態を保存/復元するキー
            const CHECKKEY = 'bbqChecklistProgress';

            // 初期状態の復元
            const savedProgress = localStorage.getItem(CHECKKEY);
            if(savedProgress) {
                try {
                    const parsed = JSON.parse(savedProgress);
                    checkboxes.forEach((cb, index) => {
                        cb.checked = parsed[index] || false;
                    });
                } catch(e) {}
            }

            function updateProgress() {
                const checkedCount = document.querySelectorAll('.check-input:checked').length;
                progressText.textContent = `${checkedCount} / ${total}`;
                
                const percentage = (checkedCount / total) * 100;
                progressBar.style.width = `${percentage}%`;
                
                if (percentage === 100) {
                    progressBar.style.backgroundColor = '#10B981'; // 完了時は緑色に
                } else {
                    progressBar.style.backgroundColor = 'var(--brand)';
                }

                // 状態を保存
                const states = Array.from(checkboxes).map(cb => cb.checked);
                localStorage.setItem(CHECKKEY, JSON.stringify(states));
            }

            // 初期計算
            updateProgress();

            // イベントリスナー
            checkboxes.forEach(cb => {
                cb.addEventListener('change', updateProgress);
            });
        });
    </script>
